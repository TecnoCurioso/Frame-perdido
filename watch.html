<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
        }
        .player-container {
            max-width: 900px;
            width: 100%;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
            border: 1px solid #2a2a3a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ff6b35;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.3s;
        }
        .back:hover { opacity: 0.7; }
        .error {
            color: #8a8a9a;
            text-align: center;
            padding: 40px;
        }
        .error p:first-child { font-size: 1.2rem; margin-bottom: 8px; }
        .video-title {
            text-align: center;
            color: #e8e8f0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="player-container" id="container"></div>

    <script>
        // ============================================================
        // BASE DE DATOS DE VIDEOS
        // ============================================================
        // IMPORTANTE: Usa SOLO URLs de tipo embed: https://www.youtube.com/embed/VIDEO_ID
        const videos = {
            26: {
                title: "Call Me Tonight",
                url: "https://www.youtube.com/embed/VoPvrHkgzZQ"
            }
            // Añade más aquí con el formato embed
        };

        // ============================================================
        // LEER EL ID DE LA URL
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // ============================================================
        // RENDERIZAR
        // ============================================================
        const container = document.getElementById('container');

        if (id && videos[id]) {
            const video = videos[id];
            container.innerHTML = `
                <h1 class="video-title">${video.title}</h1>
                <div class="player-wrapper">
                    <iframe 
                        src="${video.url}" 
                        title="YouTube video player" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
                <a href="/Frame-perdido/" class="back">← Volver al catálogo</a>
            `;
            document.title = video.title + " — Frame Perdido";
        } else {
            container.innerHTML = `
                <div class="error">
                    <p>🔒 Contenido no disponible</p>
                    <p style="font-size:0.85rem;color:#5a5a6a;">ID recibido: ${id || 'ninguno'}</p>
                    <a href="/Frame-perdido/" class="back">← Volver al catálogo</a>
                </div>
            `;
            document.title = "No disponible — Frame Perdido";
        }
    </script>
</body>
</html>
