<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frame Perdido — Reproductor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #e8e8f0;
            --text-muted: #8a8a9a;
            --accent: #ff6b35;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            max-width: 960px;
            width: 100%;
        }
        .video-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
            border: 1px solid var(--border);
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .back:hover { opacity: 0.7; }

        /* Error */
        .error-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .error-box h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }
        .error-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="player-container" id="container"></div>

    <script>
        const videos = {
            26: {
                title: "Call Me Tonight",
                url: "https://www.youtube.com/embed/VoPvrHkgzZQ"
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const container = document.getElementById('container');

        if (id && videos[id]) {
            const video = videos[id];
            // Parámetros para ocultar elementos de YouTube:
            // ?rel=0           → No muestra videos relacionados al final
            // &modestbranding=1 → Logo de YouTube más pequeño/discreto
            // &iv_load_policy=3 → Oculta anotaciones del video
            // &fs=1             → Permite pantalla completa
            // &autoplay=0       → No reproduce automáticamente
            const cleanUrl = video.url + "?rel=0&modestbranding=1&iv_load_policy=3";

            container.innerHTML = `
                <h1 class="video-title">${video.title}</h1>
                <div class="player-wrapper">
                    <iframe 
                        src="${cleanUrl}" 
                        title="${video.title}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
                <a href="index.html" class="back">← Volver al catálogo</a>
            `;
            document.title = video.title + " — Frame Perdido";
        } else {
            container.innerHTML = `
                <div class="error-box">
                    <h2>🔒 Contenido no disponible</h2>
                    <p>Este expediente aún no tiene video en nuestro archivo.</p>
                    <a href="index.html" class="back">← Volver al catálogo</a>
                </div>
            `;
            document.title = "No disponible — Frame Perdido";
        }
    </script>
</body>
</html>
