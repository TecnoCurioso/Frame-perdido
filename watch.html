<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            max-width: 900px;
            width: 100%;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
            border: 1px solid #2a2a3a;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #ff6b35;
            text-decoration: none;
        }
        .error {
            color: #8a8a9a;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="player-container" id="container">
        <!-- El reproductor se carga aquí con JavaScript -->
    </div>

    <script>
        // ============================================================
        // BASE DE DATOS DE VIDEOS (SOLO LOS QUE TIENEN VIDEO)
        // ============================================================
        const videos = {
            27: {
                title: "Call Me Tonight",
                url: "https://youtu.be/VoPvrHkgzZQ?si=tGyk3KTy5Upske0y"
            }
            // AÑADE MÁS ANIMES CON VIDEO AQUÍ
            // Ejemplo:
            // 3: {
            //     title: "Big Wars",
            //     url: "https://www.youtube.com/embed/ID_DEL_VIDEO"
            // }
        };

        // ============================================================
        // LEER EL ID DE LA URL
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // ============================================================
        // BUSCAR EL VIDEO
        // ============================================================
        const container = document.getElementById('container');

        if (id && videos[id]) {
            const video = videos[id];
            container.innerHTML = `
                <div class="player-wrapper">
                    <iframe src="${video.url}" allowfullscreen></iframe>
                </div>
                <a href="/Frame-perdido/" class="back">← Volver al catálogo</a>
            `;
            document.title = video.title;
        } else {
            container.innerHTML = `
                <div class="error">
                    <p>🔒 Contenido no disponible</p>
                    <p style="font-size:0.8rem;color:#5a5a6a;">ID recibido: ${id || 'ninguno'}</p>
                    <a href="/Frame-perdido/" style="color:#ff6b35;">← Volver</a>
                </div>
            `;
        }
    </script>
</body>
</html>
