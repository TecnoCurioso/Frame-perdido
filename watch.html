<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reproductor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-container {
            max-width: 900px;
            width: 100%;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            background: #000;
            border: 1px solid #2a2a3a;
        }
        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 16px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #ff6b35;
            text-decoration: none;
        }
        .error {
            color: #8a8a9a;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="player-container" id="container">
        <!-- El reproductor se carga aquí con JavaScript -->
    </div>

    <script>
        // ============================================================
        // PASO 1: Leer el ID de la URL
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        // ============================================================
        // PASO 2: Buscar el anime en la base de datos
        // ============================================================
        // NOTA: animes es la variable GLOBAL que viene de index.html
        // Asegúrate de que en index.html uses "var animes" en lugar de "const animes"
        const anime = window.animes ? window.animes.find(a => a.id == id) : null;

        // ============================================================
        // PASO 3: Mostrar el reproductor o error
        // ============================================================
        const container = document.getElementById('container');

        if (anime && anime.reel) {
            // Detectar si es YouTube o video directo
            let videoHtml = '';
            if (anime.reel.includes('youtube.com/embed') || anime.reel.includes('youtu.be')) {
                // Es YouTube
                let embedUrl = anime.reel;
                if (embedUrl.includes('youtu.be')) {
                    const videoId = embedUrl.split('youtu.be/')[1].split('?')[0];
                    embedUrl = `https://www.youtube.com/embed/${videoId}`;
                }
                videoHtml = `
                    <div class="player-wrapper">
                        <iframe src="${embedUrl}" allowfullscreen></iframe>
                    </div>
                `;
            } else {
                // Es video directo (MP4)
                videoHtml = `
                    <div class="player-wrapper">
                        <video controls autoplay style="width:100%;height:100%;">
                            <source src="${anime.reel}" type="video/mp4">
                            Tu navegador no soporta videos.
                        </video>
                    </div>
                `;
            }

            container.innerHTML = `
                ${videoHtml}
                <a href="/Frame-perdido/" class="back">← Volver al catálogo</a>
            `;
            document.title = anime.title;
        } else {
            container.innerHTML = `
                <div class="error">
                    <p>🔒 Contenido no disponible</p>
                    <p style="font-size:0.8rem;color:#5a5a6a;">Anime no encontrado o sin video</p>
                    <a href="/Frame-perdido/" style="color:#ff6b35;">← Volver</a>
                </div>
            `;
        }
    </script>
</body>
</html>
