<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame Perdido — Reproductor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: #12121a;
            --text: #e8e8f0;
            --text-muted: #8a8a9a;
            --accent: #ff6b35;
            --border: #2a2a3a;
            --plyr-color-main: #ff6b35;
            --plyr-video-control-color: #e8e8f0;
            --plyr-video-control-color-hover: #fff;
            --plyr-video-control-background-hover: rgba(255,107,53,0.2);
            --plyr-range-fill-background: #ff6b35;
            --plyr-range-thumb-background: #ff6b35;
            --plyr-range-thumb-shadow: 0 0 10px rgba(255,107,53,0.5);
            --plyr-menu-background: #12121a;
            --plyr-menu-color: #e8e8f0;
            --plyr-tooltip-background: #1a1a25;
            --plyr-tooltip-color: #e8e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .player-page {
            max-width: 1100px;
            width: 100%;
        }
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .video-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
        }
        .video-meta {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.3s;
        }
        .back-btn:hover { opacity: 0.7; }

        .plyr-container {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .plyr--video {
            border-radius: 16px;
        }
        .plyr--video .plyr__controls {
            padding: 16px 20px;
        }

        /* ============================================================
           SELECTOR DE EPISODIOS
           ============================================================ */
        .episode-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .episode-btn {
            padding: 5px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .episode-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .episode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        /* Separador entre versiones */
        .version-separator {
            color: var(--text-muted);
            padding: 0 10px;
            font-size: 0.9rem;
            opacity: 0.4;
            user-select: none;
        }

        .expediente-info {
            margin-top: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        .expediente-info h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .expediente-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.7;
        }
        .expediente-tags {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .exp-tag {
            background: #1a1a25;
            color: var(--text-muted);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        .error-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 480px;
            margin: 0 auto;
        }
        .error-box h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        .error-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .error-box .id-received {
            display: inline-block;
            background: #1a1a25;
            border: 1px solid var(--border);
            color: #5a5a6a;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-family: 'Space Grotesk', monospace;
            margin: 12px 0;
        }

        @media (max-width: 768px) {
            .video-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="player-page" id="app"></div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // ============================================================
        // BASE DE DATOS DE VIDEOS
        // ============================================================
        const videos = {
            // ============================================================
          
            26: {
                title: "Call Me Tonight",
                year: 1986,
                studio: "AIC",
                director: "Tatsuya Okamoto",
                desc: "Una de las obras más extrañas de los 80. Un híbrido entre comedia, horror y ciencia ficción que solo podía existir en la era del OVA.",
                tags: ["OVA", "Sci-Fi", "Comedia", "Horror"],
                episodios: [
                    { num: 1, version: "", url: "https://www.youtube.com/embed/VoPvrHkgzZQ" }
                ]
            },
            // ============================================================
            
            // ============================================================
            27: {
                title: "Record of Lodoss War (OVA)",
                year: 1990,
                studio: "Madhouse",
                director: "Akinori Nagaoka",
                desc: "Un grupo de héroes debe enfrentar las fuerzas del mal que amenazan el continente de Lodoss. Una de las obras más influyentes del anime de fantasía.",
                tags: ["OVA", "Fantasía", "Aventura", "Épico"],
                episodios: [
                    // ====== SUB (13 episodios) ======
                    { num: 1, version: "Sub", url: "https://mega.nz/embed/H4Qz0QJa#NFe01m2kAcc73tn43vuRneq7khd2zado6XhgZbAPdP0" },
                    { num: 2, version: "Sub", url: "https://mega.nz/embed/C5YmGB4T#l3rEEJTPu4wClKjHCysh8dlh0E4XSZGizTMElwy5M8c" },
                    { num: 3, version: "Sub", url: "https://mega.nz/embed/LtghHTKS#7yCZNvmDMYWAtsE-7HVhN2qJgVYo-doCHk2cfYQBv3Y" },
                    { num: 4, version: "Sub", url: "https://mega.nz/embed/mphikZSL#epmeH6qkSZr_Dyysfltzk0mStebCJgFkzmJPH-M3Adk" },
                    { num: 5, version: "Sub", url: "https://mega.nz/embed/2xgjhD7L#8oyFRVV4poK2uTeDOKi59kpl33SrtZxosDT0YwChq4w" },
                    { num: 6, version: "Sub", url: "https://mega.nz/embed/ex5hzTpJ#9FEz9D-wR6nBx2UMKTu2Q70Oav7rer3pRTivmIlXFF4" },
                    { num: 7, version: "Sub", url: "https://mega.nz/embed/7gISCL5S#C_50qSIUFE4oIymQsTFbl-yufIswt8irbWKbjpSMr7U" },
                    { num: 8, version: "Sub", url: "https://mega.nz/embed/LtgAmaaa#2XUNF7Wk6uNc8SEnMt6RXj6-9ry_y25lwcNemcZU6Is" },
                    { num: 9, version: "Sub", url: "https://mega.nz/embed/YYtnTZBY#CYVt16jnj8jcE3TgjA_mEJUlaDWALDx8kjGK7MsPLHk" },
                    { num: 10, version: "Sub", url: "https://mega.nz/embed/z0ZSgZyZ#adXJy9K_naJrYDJKfTZo0tedWCtCl8rN_y_nc_ixpt4" },
                    { num: 11, version: "Sub", url: "https://mega.nz/embed/D1hFCDjB#IzwvHgxyLeFMOQSbgLgQ8YwivZzUBhKAbsh1kH7JsIE" },
                    { num: 12, version: "Sub", url: "https://mega.nz/embed/mowVGKrQ#DSYWB56S2fFpCFIxnDC1f-Rd_In9AlMnTkTDxowXYD4" },
                    { num: 13, version: "Sub", url: "https://mega.nz/embed/qpgjlLoZ#9Y_BwY2zCfunzZe-oejVrQ-h7XCSn48rdDhDOOp6cqw" },
                    // ====== DOBLADO (13 episodios) ======
                    { num: 1, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_1" },
                    { num: 2, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_2" },
                    { num: 3, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_3" },
                    { num: 4, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_4" },
                    { num: 5, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_5" },
                    { num: 6, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_6" },
                    { num: 7, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_7" },
                    { num: 8, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_8" },
                    { num: 9, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_9" },
                    { num: 10, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_10" },
                    { num: 11, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_11" },
                    { num: 12, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_12" },
                    { num: 13, version: "Dob", url: "https://www.youtube.com/embed/ID_DOB_13" }
                ]
            },

          
8:{
    title: "Midori: La Niña de las Camelias",
    year: 1992,
    studio: "Harada Production",
    director: "Hiroshi Harada",
    desc: "Una niña huérfana cae en un circo de fenómenos. Experiencia visual extrema.",
    tags: ["Drama", "Terror", "Psicológico", "Ero-guro"],
    episodios: [
    
        { num: 1, version: "", url: "https://q8y5z.com/d/gvl0qllv2dlp" }
    ]
}
        };

        // ============================================================
        // LEER PARÁMETROS DE LA URL
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const ep = parseInt(params.get('ep')) || 1;
        const version = params.get('version') || null;

        const app = document.getElementById('app');

        // ============================================================
        // BUSCAR EL ANIME Y EL EPISODIO
        // ============================================================
        if (id && videos[id]) {
            const v = videos[id];
            const episodios = v.episodios;

            // Buscar el episodio solicitado
            let episodioActual = episodios.find(e => e.num === ep && (version ? e.version === version : true));
            if (!episodioActual) {
                episodioActual = episodios[0];
            }

            // ============================================================
            // GENERAR BOTONES CON SEPARADOR ENTRE VERSIONES
            // ============================================================
            let botonesHtml = '';
            let ultimaVersion = '';
            let primerBoton = true;

            episodios.forEach(e => {
                // Si cambia la versión y no es el primer botón, agregar separador
                if (!primerBoton && e.version !== ultimaVersion) {
                    botonesHtml += `<span class="version-separator">|</span>`;
                }
                primerBoton = false;
                ultimaVersion = e.version;

                const isActive = (e.num === episodioActual.num && e.version === episodioActual.version);
                const activeClass = isActive ? 'active' : '';
                let label = e.version ? `${e.version}${e.num}` : `Ep. ${e.num}`;

                botonesHtml += `
                    <button class="episode-btn ${activeClass}" 
                            onclick="cambiarEpisodio(${id}, ${e.num}, '${e.version}')">
                        ${label}
                    </button>
                `;
            });

            const mostrarSelector = episodios.length > 1;

            // ============================================================
            // TÍTULO CON EPISODIO
            // ============================================================
            let titleSuffix = '';
            if (episodioActual.version) {
                titleSuffix = ` — ${episodioActual.version} ${episodioActual.num}`;
            } else if (episodios.length > 1) {
                titleSuffix = ` — Episodio ${episodioActual.num}`;
            }

            // ============================================================
            // URL LIMPIA (sin logos de YouTube)
            // ============================================================
            const cleanUrl = episodioActual.url + "?rel=0&modestbranding=1&iv_load_policy=3&origin=" + encodeURIComponent(window.location.origin);

            // ============================================================
            // RENDERIZAR
            // ============================================================
            app.innerHTML = `
                <div class="video-header">
                    <div>
                        <h1 class="video-title">${v.title}${titleSuffix}</h1>
                        <span class="video-meta">${v.year} · ${v.studio} · ${v.director}</span>
                    </div>
                    <a href="index.html" class="back-btn">← Volver</a>
                </div>

                <div class="plyr-container">
                    <div class="plyr__video-embed" id="player">
                        <iframe
                            src="${cleanUrl}"
                            allowfullscreen
                            allowtransparency
                            allow="autoplay; encrypted-media; picture-in-picture; web-share"
                        ></iframe>
                    </div>
                </div>

                ${mostrarSelector ? `<div class="episode-selector">${botonesHtml}</div>` : ''}

                <div class="expediente-info">
                    <h3>📁 Sobre este expediente</h3>
                    <p>${v.desc}</p>
                    <div class="expediente-tags">
                        ${v.tags.map(t => `<span class="exp-tag">${t}</span>`).join('')}
                    </div>
                </div>
            `;

            document.title = v.title + titleSuffix + " — Frame Perdido";

            // ============================================================
            // INICIAR PLYR
            // ============================================================
            if (document.getElementById('player')) {
                const player = new Plyr('#player', {
                    youtube: {
                        noCookie: false,
                        rel: 0,
                        modestbranding: 1,
                        iv_load_policy: 3
                    },
                    tooltips: { controls: true, seek: true },
                    keyboard: { focused: true, global: true }
                });
            }

        } else {
            // ============================================================
            // ERROR: CONTENIDO NO DISPONIBLE
            // ============================================================
            app.innerHTML = `
                <div class="error-box">
                    <h2>🔒 Contenido no disponible</h2>
                    <p>Este expediente aún no tiene video en nuestro archivo.</p>
                    <span class="id-received">ID: ${id || 'ninguno'}</span>
                    <a href="index.html" class="back-btn" style="margin-top:20px;display:inline-block;">← Volver al catálogo</a>
                </div>
            `;
            document.title = "No disponible — Frame Perdido";
        }

        // ============================================================
        // FUNCIÓN PARA CAMBIAR DE EPISODIO
        // ============================================================
        function cambiarEpisodio(id, num, version) {
            let url = `watch.html?id=${id}&ep=${num}`;
            if (version) {
                url += `&version=${version}`;
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
